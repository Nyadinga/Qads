openapi: 3.0.3

info:
  title: QADS API
  version: 2.0.0
  description: |
    QADS API documentation.

    This API supports:
    - User authentication
    - User profile and account management
    - Advertiser operations
    - Promoter operations
    - Campaign management
    - Wallet and withdrawals
    - Click tracking and fraud monitoring
    - Admin moderation and platform management
    - Reporting and analytics
    - Referral operations
servers:
  - url: http://127.0.0.1:4010
    description: Local mock server
tags:
  - name: Authentication
    description: Endpoints for user registration, login, OTP verification, password reset, and token-based authentication

  - name: Users
    description: Endpoints for user profile, preferences, and account management

  - name: Campaigns
    description: Endpoints for campaign creation, update, approval, and lifecycle management

  - name: Promoter
    description: Endpoints for promoters to browse campaigns, generate links, and track earnings

  - name: Wallet
    description: Endpoints for wallet balance, earnings, transactions, and withdrawals

  - name: Click Tracking
    description: Endpoints for click recording, validation, and fraud analysis

  - name: Admin
    description: Endpoints for platform administration, approvals, moderation, and fraud review

  - name: Reports
    description: Endpoints for reporting, analytics, and performance insights

  - name: Referrals
    description: Endpoints for referral management and referral rewards tracking

paths:
  /auth/register:
    $ref: './paths/auth/register/register.yaml'

  /auth/register/verify-otp:
    $ref: './paths/auth/register/register-verify-otp.yaml'

  /auth/register/resend-otp:
    $ref: './paths/auth/register/register-resend-otp.yaml'

  /auth/login:
    $ref: './paths/auth/login/login.yaml'

  /auth/login/verify-otp:
    $ref: './paths/auth/login/login-verify-otp.yaml'

  /auth/login/resend-otp:
    $ref: './paths/auth/login/login-resend-otp.yaml'

  /auth/forgot-password:
    $ref: './paths/auth/forgot-password.yaml'

  /auth/reset-password:
    $ref: './paths/auth/reset-password.yaml'

  /auth/logout:
    $ref: './paths/auth/logout.yaml'
  
  /auth/refresh-token:
    $ref: './paths/auth/refresh-token.yaml'