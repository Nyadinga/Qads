post:
  tags:
    - Authentication

  summary: Start password recovery

  description: |
    This endpoint starts the password recovery flow.

    The user provides an account identifier:
    - email address
    - or phone number

    Identifier handling rules:
    - if the identifier contains `@`, it is treated as an email address
    - otherwise, it is treated as a phone number

    If the account exists and is eligible for password recovery, the system will:
    - create a password recovery verification session
    - generate a password reset OTP
    - send the OTP through WhatsApp first
    - fall back to email if WhatsApp is not available

    This endpoint does NOT reset the password directly.
    The user must use the returned verificationSessionId and OTP with the reset password endpoint.

  operationId: forgotPassword

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - identifier
          properties:
            identifier:
              type: string
              description: |
                Email address or phone number of the user.

                Rules:
                - If the value contains `@`, it is treated as an email address.
                - Otherwise, it is treated as a phone number.
              example: fabien@example.com

  responses:
    '200':
      description: Password recovery OTP sent successfully.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - message
              - data
            properties:
              success:
                type: boolean
                example: true

              message:
                type: string
                example: Password recovery OTP sent successfully.

              data:
                type: object
                required:
                  - verificationSessionId
                  - verificationChannel
                  - otpExpiresIn
                  - nextStep
                properties:
                  verificationSessionId:
                    type: string
                    format: uuid
                    description: Verification session identifier used for password reset.
                    example: "9c8a7f60-8a4c-4c7c-9a1d-2c4f5a1b7c55"

                  verificationChannel:
                    type: string
                    enum:
                      - whatsapp
                      - email
                    example: whatsapp

                  otpExpiresIn:
                    type: integer
                    description: OTP validity duration in seconds.
                    example: 300

                  nextStep:
                    type: string
                    enum:
                      - reset_password
                    example: reset_password

    '400':
      description: Invalid request payload.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidRequest
                example: InvalidRequest

              message:
                type: string
                example: The request payload is missing the required identifier.

    '404':
      description: Account not found.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - AccountNotFound
                example: AccountNotFound

              message:
                type: string
                example: No account was found for the provided identifier.

    '403':
      description: Account not allowed to reset password.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - AccountSuspended
                example: AccountSuspended

              message:
                type: string
                example: This account is suspended and cannot perform password recovery.

    '429':
      description: Too many requests.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
              - retryAfterSeconds
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - TooManyRequests
                example: TooManyRequests

              message:
                type: string
                example: Too many password recovery requests. Please wait before trying again.

              retryAfterSeconds:
                type: integer
                example: 60

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InternalServerError
                example: InternalServerError

              message:
                type: string
                example: Something went wrong while starting password recovery.