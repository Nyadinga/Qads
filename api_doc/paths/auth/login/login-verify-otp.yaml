post:
  tags:
    - Authentication

  summary: Verify login OTP

  description: |
    This endpoint verifies the OTP sent after a successful login credential check.

    After the user submits a valid identifier and password through the login endpoint,
    the system creates a temporary verification session and sends an OTP for second-step verification.

    Upon successful OTP verification, the system will:
    - validate the verification session
    - mark the OTP session as verified
    - create an authenticated session
    - return an access token
    - allow the user to access the dashboard

    OTP delivery priority:
    1. WhatsApp is used as the primary channel
    2. Email is used as a fallback if WhatsApp is unavailable

  operationId: verifyLoginOtp

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - verificationSessionId
            - otp
          properties:

            verificationSessionId:
              type: string
              format: uuid
              description: Verification session ID returned by the login endpoint.
              example: "9c8a7f60-8a4c-4c7c-9a1d-2c4f5a1b7c55"

            otp:
              type: string
              description: One-time password sent for login verification.
              minLength: 4
              maxLength: 8
              example: "593201"

  responses:

    '200':
      description: Login OTP verified successfully.
      content:
        application/json:
          schema:

            type: object

            required:
              - success
              - message
              - data

            properties:

              success:
                type: boolean
                example: true

              message:
                type: string
                example: Login verification successful.

              data:

                type: object

                required:
                  - accessToken
                  - tokenType
                  - expiresIn
                  - user
                  - nextStep

                properties:

                  accessToken:
                    type: string
                    description: JWT access token used for authenticated requests.
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

                  tokenType:
                    type: string
                    enum:
                      - Bearer
                    example: Bearer

                  expiresIn:
                    type: integer
                    description: Access token lifetime in seconds.
                    example: 3600

                  user:

                    type: object

                    required:
                      - id
                      - firstName
                      - lastName
                      - email
                      - phoneNumber
                      - roles
                      - accountStatus

                    properties:

                      id:
                        type: integer
                        example: 125

                      firstName:
                        type: string
                        example: Fabien

                      lastName:
                        type: string
                        example: Awono

                      email:
                        type: string
                        format: email
                        example: fabien@example.com

                      phoneNumber:
                        type: string
                        example: "+237600000000"

                      roles:
                        type: array
                        items:
                          type: string
                          enum:
                            - advertiser
                            - promoter
                        example:
                          - advertiser
                          - promoter

                      accountStatus:
                        type: string
                        enum:
                          - active
                        example: active

                  nextStep:
                    type: string
                    enum:
                      - dashboard
                    example: dashboard

    '400':
      description: Invalid request payload.
      content:
        application/json:
          schema:

            type: object

            required:
              - success
              - error
              - message

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidRequest
                example: InvalidRequest

              message:
                type: string
                example: The request payload is missing required fields or is malformed.

    '410':
      description: OTP expired.
      content:
        application/json:
          schema:

            type: object

            required:
              - success
              - error
              - message

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - OtpExpired
                example: OtpExpired

              message:
                type: string
                example: The OTP has expired. Please request a new one.

    '422':
      description: Invalid OTP provided.
      content:
        application/json:
          schema:

            type: object

            required:
              - success
              - error
              - message

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidOtp
                example: InvalidOtp

              message:
                type: string
                example: The OTP provided is incorrect.

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:

            type: object

            required:
              - success
              - error
              - message

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InternalServerError
                example: InternalServerError

              message:
                type: string
                example: Something went wrong while verifying the login OTP.