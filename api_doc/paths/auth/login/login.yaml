post:
  tags:
    - Authentication

  summary: Login user

  description: |
    This endpoint validates the user's login credentials.

    The user may log in using:
    - email + password
    - phone number + password

    If credentials are correct, the system will:
    - create a temporary login verification session
    - generate a login OTP
    - send OTP via WhatsApp as the primary channel
    - fall back to email if WhatsApp is not available

    The user must verify the OTP before accessing the dashboard.

    This endpoint does NOT return an access token.

  operationId: loginUser


  requestBody:

    required: true

    content:

      application/json:

        schema:

          type: object

          required:
            - identifier
            - password

          properties:

            identifier:
              type: string
              description: Email address or phone number of the user.
              example: fabien@example.com

            password:
              type: string
              format: password
              example: StrongPass123!


  responses:


    '200':

      description: Credentials validated successfully. OTP sent for login verification.

      content:

        application/json:

          schema:

            type: object

            properties:

              success:
                type: boolean
                example: true

              message:
                type: string
                example: Password verified. OTP sent for login verification.

              data:

                type: object

                properties:

                  loginSessionId:
                    type: string
                    format: uuid
                    description: Temporary login session identifier used for OTP verification.
                    example: 9c8a7f60-8a4c-4c7c-9a1d-2c4f5a1b7c55

                  verificationChannel:
                    type: string
                    enum:
                      - whatsapp
                      - email
                    example: whatsapp

                  loginStatus:
                    type: string
                    example: otp_pending

                  nextStep:
                    type: string
                    example: verify_login_otp


    '400':

      description: Invalid request payload.

      content:

        application/json:

          schema:

            type: object

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                example: InvalidRequest

              message:
                type: string
                example: Identifier and password are required.
    
    '429':

      description: Too many requests.

      content:

        application/json:

          schema:
            type: object
            properties:

          success:
            type: boolean
            example: false

          error:
            type: string
            example: TooManyRequests

          message:
            type: string
            example: Too many requests. Please wait before trying again.
            
          retryAfterSeconds:
            type: integer
            example: 60

    '401':

      description: Invalid credentials.

      content:

        application/json:

          schema:

            type: object

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                example: InvalidCredentials

              message:
                type: string
                example: The email/phone or password provided is incorrect.


    '403':

      description: Account not allowed to login.

      content:

        application/json:

          schema:

            type: object

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                example: AccountNotActive

              message:
                type: string
                example: Account is not active. Please complete registration verification first.


    '500':

      description: Internal server error.

      content:

        application/json:

          schema:

            type: object

            properties:

              success:
                type: boolean
                example: false

              error:
                type: string
                example: InternalServerError

              message:
                type: string
                example: Something went wrong while processing the login request.