post:
  tags:
    - Authentication

  summary: Refresh access token

  description: |
    This endpoint issues a new access token using a valid refresh token.

    It is used when the current access token has expired or is close to expiring,
    allowing the user to continue using the platform without logging in again.

    When the refresh token is valid, the system will:
    - validate the refresh token
    - confirm that the related session is still active
    - issue a new access token
    - optionally rotate and return a new refresh token
    - preserve the user's authenticated session within the configured session window

    This endpoint does NOT require an access token.
    It depends on a valid refresh token.

  operationId: refreshAccessToken

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - refreshToken
          properties:
            refreshToken:
              type: string
              description: Valid refresh token issued during login verification.
              example: "def50200ab34c9f8d1e7f6c2a8b9c0d1234567890abcdef"

  responses:
    '200':
      description: Access token refreshed successfully.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - message
              - data
            properties:
              success:
                type: boolean
                example: true

              message:
                type: string
                example: Access token refreshed successfully.

              data:
                type: object
                required:
                  - accessToken
                  - refreshToken
                  - tokenType
                  - expiresIn
                properties:
                  accessToken:
                    type: string
                    description: Newly issued JWT access token.
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.newAccessTokenPayload"

                  refreshToken:
                    type: string
                    description: Refresh token to be used for subsequent refresh operations. This may be rotated.
                    example: "def50200f98a7e6b5c4d3a2b10987654321fedcba0987654321"

                  tokenType:
                    type: string
                    enum:
                      - Bearer
                    example: Bearer

                  expiresIn:
                    type: integer
                    description: Access token lifetime in seconds.
                    example: 3600

    '400':
      description: Invalid request payload.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidRequest
                example: InvalidRequest

              message:
                type: string
                example: The request payload is missing the required refresh token.

    '401':
      description: Refresh token is invalid, expired, revoked, or does not belong to an active session.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidRefreshToken
                  - ExpiredRefreshToken
                  - RevokedRefreshToken
                  - SessionNotActive
                example: InvalidRefreshToken

              message:
                type: string
                example: The refresh token is invalid or no longer active.

    '429':
      description: Too many refresh attempts.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
              - retryAfterSeconds
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - TooManyRequests
                example: TooManyRequests

              message:
                type: string
                example: Too many token refresh attempts. Please wait before trying again.

              retryAfterSeconds:
                type: integer
                example: 60

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InternalServerError
                example: InternalServerError

              message:
                type: string
                example: Something went wrong while refreshing the access token.