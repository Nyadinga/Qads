post:
  tags:
    - Authentication

  summary: Reset password

  description: |
    This endpoint completes the password recovery flow.

    The user must provide:
    - verificationSessionId received from the forgot password endpoint
    - OTP received through WhatsApp or email
    - new password
    - confirm password

    If the OTP is valid and not expired, the system will:
    - verify the password recovery session
    - update the user's password
    - invalidate the used verification session
    - allow the user to log in with the new password

    This endpoint does NOT authenticate the user and does NOT return an access token.

  operationId: resetPassword

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - verificationSessionId
            - otp
            - newPassword
            - confirmPassword
          properties:
            verificationSessionId:
              type: string
              format: uuid
              description: Verification session identifier returned by the forgot password endpoint.
              example: "9c8a7f60-8a4c-4c7c-9a1d-2c4f5a1b7c55"

            otp:
              type: string
              description: One-time password sent for password recovery.
              minLength: 4
              maxLength: 8
              example: "482911"

            newPassword:
              type: string
              format: password
              minLength: 8
              example: StrongPass123!

            confirmPassword:
              type: string
              format: password
              description: Must exactly match the newPassword field.
              example: StrongPass123!

  responses:
    '200':
      description: Password reset successfully.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - message
              - data
            properties:
              success:
                type: boolean
                example: true

              message:
                type: string
                example: Password reset successful.

              data:
                type: object
                required:
                  - userId
                  - passwordReset
                  - nextStep
                properties:
                  userId:
                    type: integer
                    description: Unique database identifier of the user whose password was reset.
                    example: 125

                  passwordReset:
                    type: boolean
                    example: true

                  nextStep:
                    type: string
                    enum:
                      - login
                    example: login

    '400':
      description: Invalid request payload or password mismatch.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidRequest
                  - PasswordMismatch
                  - WeakPassword
                example: PasswordMismatch

              message:
                type: string
                example: New password and confirm password do not match.

    '404':
      description: Verification session not found.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - VerificationSessionNotFound
                example: VerificationSessionNotFound

              message:
                type: string
                example: The verification session could not be found.

    '410':
      description: OTP expired.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - OtpExpired
                example: OtpExpired

              message:
                type: string
                example: The OTP has expired. Please request a new one.

    '422':
      description: Invalid OTP provided.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InvalidOtp
                example: InvalidOtp

              message:
                type: string
                example: The OTP provided is incorrect.

    '429':
      description: Too many password reset attempts.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
              - retryAfterSeconds
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - TooManyRequests
                example: TooManyRequests

              message:
                type: string
                example: Too many password reset attempts. Please wait before trying again.

              retryAfterSeconds:
                type: integer
                example: 60

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - message
            properties:
              success:
                type: boolean
                example: false

              error:
                type: string
                enum:
                  - InternalServerError
                example: InternalServerError

              message:
                type: string
                example: Something went wrong while resetting the password.